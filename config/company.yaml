id: ai-startup-company
name: AI Startup Company
mission: Build products through reusable agent, skill, and workflow execution.
default_workflow: build-product
default_agents:
  - ceo-agent
  - product-agent
  - architect-agent
  - engineer-agent
  - qa-agent
  - release-manager-agent
rules:
  - company-must-own-agents
  - agent-must-have-skill
  - workflow-step-agent-must-be-company-agent
  - workflow-step-skill-must-be-allowed
  - architecture-step-requires-approval
  - release-step-requires-approval
  - development-step-retries-on-failure
  - testing-step-handoff-to-release-manager
